<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>診察の流れ</title>
  <style>
    /* --- 1. 基本リセット：隙間を徹底的に排除 --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background-color: #ffffff;
      margin: 0; padding: 0;
      /* iPhoneのホームバー（セーフエリア）対策 */
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .container { width: 100%; overflow-x: hidden; }

    /* 画像の上下に出る数ピクセルの謎の隙間を消す */
    .form-editor > div, .form-group {
      margin: 0 !important;
      padding: 0 !important;
      line-height: 0;
      font-size: 0;
    }

    .description-image {
      width: 100%;
      display: block;
      margin: 0;
      vertical-align: bottom;
    }

    /* --- 2. アニメーションパーツ（パーツは外部URLから取得） --- */
    .form-editor > div:nth-child(1) { display:none; } 
    .form-editor > div:nth-child(2) { position: relative; z-index: 900; }
    
    .form-editor div:nth-child(2) .col-sm-12:before {
      content: ""; position: absolute; width: 50.26%; aspect-ratio: 784/262;
      background: url(https://d27rnpuamwvieu.cloudfront.net/0fZb3xLuJyCmduX8dojK2dwXX/normal) no-repeat center/contain;
      top: 1%; left: 4.4%; opacity: 0; animation: feedin-Up 0.5s 0.2s forwards;
    }
    .form-editor div:nth-child(2) .col-sm-12:after {
      content: ""; position: absolute; width:78.13%; aspect-ratio: 1172/228;
      background: url(https://d27rnpuamwvieu.cloudfront.net/0dNeOXtpU4pzMev1MpbOrhgXX/normal) no-repeat center/contain;
      top: 48.8%; left: 11.1%; opacity: 0; animation: feedin-Up 0.5s 1.1s forwards;
    }

    /* --- 3. 固定ボタン（色を背景に敷いて白い線を消す） --- */
    .form-editor div:nth-child(6), .form-editor div:nth-child(7) {
      position: fixed;
      bottom: 0;
      z-index: 2000;
      height: calc(75px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 左ボタン（戻る）：画像と同じ水色を背景に設定 */
    .form-editor div:nth-child(6) {
      width: 46.5%;
      left: 0;
      background-color: #9bc2e6; 
    }
    .form-editor div:nth-child(6) a::before {
      content: ""; display: block; width: 100%; height: 75px;
      background: url(https://d27rnpuamwvieu.cloudfront.net/08AVsRiBfCzj4uvDkZGjKpgXX/normal) no-repeat bottom/contain;
    }

    /* 右ボタン（予約）：画像と同じ濃い青を背景に設定 */
    .form-editor div:nth-child(7) {
      width: 53.5%;
      right: 0;
      background-color: #4472c4;
    }
    .form-editor div:nth-child(7) a::before {
      content: ""; display: block; width: 100%; height: 75px;
      background: url(https://d27rnpuamwvieu.cloudfront.net/0liqkBiyY11Q8sJBH3scOkgXX/normal) no-repeat bottom/contain;
    }

    /* 共通リンク */
    .btn-link { 
      display: block; 
      width: 100%; 
      height: 100%; 
      text-indent: -9999px; 
      -webkit-tap-highlight-color: transparent;
    }

    /* 下からふわっと浮き上がる動き */
    @keyframes feedin-Up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="form-editor">
    
    <div></div>

    <div class="form-group">
      <div class="col-sm-12">
        <img src="IMG_1227.png" class="description-image">
      </div>
    </div>

    <div class="form-group">
      <img src="IMG_1228.png" class="description-image">
    </div>

    <div class="form-group">
      <img src="IMG_1229.jpeg" class="description-image">
    </div>

    <div class="form-group">
      <img src="IMG_1230.jpeg" class="description-image">
    </div>

    <div>
      <a href="https://line.me/R/ti/p/@468abuod" class="btn-link">戻る</a>
    </div>

    <div>
      <a href="https://liff.line.me/2009400645-19jige5V/salon/dateselector/week/2026/3/15?liff_id=2009400645-19jige5V&is=GN9yXejuAI" class="btn-link">予約する</a>
    </div>

  </div>
</div>

</body>
</html>
